name: Generate Datas

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day
    - cron: "0 */12 * * *" 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    
    # Permission is required to push to the 'output' branch
    permissions:
      contents: write

    steps:
      # Generates the snake using only the dark palette
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: 4tuneout
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark

      # Deploys the generated SVG to the 'output' branch
      - uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
