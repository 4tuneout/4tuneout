name: Generate Datas

on:
  schedule:
    - cron: "0 */12 * * *" # Runs at the start of the hour every 12 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    
    # Required to fix the 403 Permission Denied error
    permissions:
      contents: write

    steps:
      # Use a specific version (v3) for better reliability
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: 4tuneout
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
